<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Backhaul Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #1a2733;
            border: 1px solid #2d4a5e;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .login-box h1 {
            font-size: 20px;
            color: #4fc3f7;
            margin-bottom: 8px;
        }
        .login-box .subtitle {
            font-size: 13px;
            color: #78909c;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #90a4ae;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            background: #0f1923;
            border: 1px solid #2d4a5e;
            border-radius: 6px;
            color: #fff;
            outline: none;
            margin-bottom: 18px;
        }
        input:focus { border-color: #4fc3f7; }
        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #1e3a4a;
            color: #4fc3f7;
            border: 1px solid #2d4a5e;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #2d4a5e; }
        .error {
            background: #3a1a1a;
            border: 1px solid #7f1d1d;
            color: #f87171;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #546e7a;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #4fc3f7; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Backhaul Monitor</h1>
        <div class="subtitle">Admin Login</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
        <a href="/" class="back-link">Back to monitor</a>
    </div>
</body>
</html>
